aid: microsoft-power-pages
name: Microsoft Power Pages
description: >-
  Microsoft Power Pages is a secure, enterprise-grade, low-code platform
  for creating, hosting, and administering modern external-facing business
  websites. It provides APIs for CRUD operations on Dataverse tables from
  portal pages.
